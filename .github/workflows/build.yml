# ─────────────────────────────────────────────────────────────────────────────
# Shri Satyanarayankatha — Flutter CI/CD
#
# Triggers:
#   • Every push / PR to main  → builds debug APK (+ release if secrets exist)
#   • Tag  v*.*.*              → builds all 3 artefacts + creates GitHub Release
#   • Manual (Actions tab)     → full build on demand
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   KEYSTORE_BASE64   base64-encoded .jks file
#                     generate:  keytool -genkey -v -keystore release.jks \
#                                  -alias ashtavakra -keyalg RSA -keysize 2048 \
#                                  -validity 10000
#                     encode:    base64 -w 0 release.jks  (Linux/macOS)
#                                [Convert]::ToBase64String([IO.File]::ReadAllBytes("release.jks")) (PowerShell)
#   KEY_ALIAS         alias used when generating the keystore
#   KEY_PASSWORD      key password
#   STORE_PASSWORD    keystore password
# ─────────────────────────────────────────────────────────────────────────────

name: Flutter Build

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.38.6'
  JAVA_VERSION: '17'

# ── 1. Analyse & test ────────────────────────────────────────────────────────
jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

# ── 2. Debug APK ─────────────────────────────────────────────────────────────
  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Rename Debug APK
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr '+' '-')
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/ShriSatyanarayankatha-${VERSION}-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/ShriSatyanarayankatha-*-debug.apk
          retention-days: 30

# ── 3. Release APK + AAB ─────────────────────────────────────────────────────
  build-release:
    name: Release APK + AAB
    runs-on: ubuntu-latest
    needs: analyze
    # Only run on main branch pushes and tags (not PRs)
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ── Signing setup ──────────────────────────────────────────────────────
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Write key.properties
        env:
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=${STORE_PASSWORD}
          keyPassword=${KEY_PASSWORD}
          keyAlias=${KEY_ALIAS}
          storeFile=keystore.jks
          EOF

      # ── Builds ────────────────────────────────────────────────────────────
      - name: Build Release APK
        run: flutter build apk --release

      - name: Build AAB (Play Store)
        run: flutter build appbundle --release

      # ── Rename with version ───────────────────────────────────────────────
      - name: Rename release artefacts
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr '+' '-')
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ShriSatyanarayankatha-${VERSION}-release.apk
          mv build/app/outputs/bundle/release/app-release.aab \
             build/app/outputs/bundle/release/ShriSatyanarayankatha-${VERSION}-release.aab

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/ShriSatyanarayankatha-*-release.apk
          retention-days: 90

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/ShriSatyanarayankatha-*-release.aab
          retention-days: 90

# ── 4. GitHub Release (tags only) ────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [ build-debug, build-release ]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artefacts
        run: find artifacts/ -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/debug-apk/*.apk
            artifacts/release-apk/*.apk
            artifacts/release-aab/*.aab
